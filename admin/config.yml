# === এটি আপনার সবচেয়ে সহজ (Simplest) কনফিগারেশন ===

backend:
  name: github
  repo: cryptowebbuild/CryptoWebBuild-  # এটি আপনার সঠিক রিপোর নাম
  branch: main # আপনার প্রধান ব্রাঞ্চ

# ছবিগুলো কোথায় সেভ হবে
media_folder: "images/uploads"
public_folder: "/images/uploads"

# আপনি কী কী এডিট করতে চান (Collections)
collections:
  - name: "blog" # ব্লগ পোস্টের কালেকশন
    label: "Blog Posts" # অ্যাডমিন প্যানেলে কী নাম দেখাবে
    folder: "_posts" # সব নতুন ব্লগ পোস্ট এই ফোল্ডারে সেভ হবে
    create: true
    
    # পোস্টের ফরম্যাট কেমন হবে
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
