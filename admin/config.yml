# === এটি আপনার অ্যাডমিন প্যানেলের প্রধান কনফিগারেশন (শুধু ব্লগের জন্য) ===

backend:
  name: github
  repo: cryptowebbuild/cryptowebbuild  # আপনার GitHub ইউজারনেম/রিপোর নাম
  branch: main # আপনার প্রধান ব্রাঞ্চ (main)
  
# Cloudflare Pages-এর সাথে কাজ করার জন্য
publish_mode: editorial_workflow

# ছবিগুলো কোথায় সেভ হবে
media_folder: "images/uploads" # নতুন ছবিগুলো এই ফোল্ডারে সেভ হবে
public_folder: "/images/uploads"

# আপনি কী কী এডিট করতে চান (Collections)
collections:
  # ১. ব্লগ পোস্ট এডিট করার সেকশন
  - name: "blog"
    label: "Blog Posts (ব্লগ পোস্ট)"
    label_singular: "Blog Post"
    folder: "_posts" # সব নতুন ব্লগ পোস্ট এই ফোল্ডারে সেভ হবে
    create: true # নতুন পোস্ট তৈরি করার অনুমতি দেবে
    slug: "{{slug}}" # ফাইলের নাম হবে টাইটেলের ওপর ভিত্তি করে
    
    # নতুন পোস্টের ফরম্যাট কেমন হবে
    fields:
      - { label: "Title (শিরোনাম)", name: "title", widget: "string" }
      - { label: "Publish Date (তারিখ)", name: "date", widget: "datetime" }
      - { label: "Featured Image (প্রধান ছবি)", name: "image", widget: "image", required: false }
      - { label: "Body (লেখা)", name: "body", widget: "markdown" }
