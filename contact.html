<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Contact — Work With Sagor Ahamed | CryptoWebBuild</title>
  <meta name="description"
        content="Contact Sagor Ahamed for Crypto, Web3, E-commerce, and Business website development. Fast replies, SEO-focused builds, mobile-first performance. Get a free quote.">

  <link rel="canonical" href="https://cryptowebbuild.com/contact">

  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="Contact — Work With Sagor Ahamed">
  <meta property="og:description" content="Get a free quote for Crypto, Web3 or Business website development. Fast response.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cryptowebbuild.com/contact">
  <meta property="og:image" content="https://cryptowebbuild.com/og-image.jpg">

  <!-- Fonts + CSS -->
  <link rel="stylesheet" href="/style.css">

  <style>
    .contact-section {
      padding: 60px 0;
    }
    .contact-box {
      max-width: 650px;
      margin: auto;
      background: rgba(255,255,255,0.03);
      padding: 28px;
      border-radius: 14px;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
    }
    .contact-box h1 {
      margin-bottom: 14px;
      font-size: 2rem;
    }
    .contact-box p {
      color: rgba(255,255,255,0.85);
      margin-bottom: 22px;
    }
    .contact-form input,
    .contact-form select,
    .contact-form textarea {
      width: 100%;
      padding: 14px;
      margin-bottom: 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-size: 1rem;
    }
    .contact-form button {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      background: var(--primary-blue);
      border: none;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.25s;
    }
    .contact-form button:hover {
      opacity: 0.85;
    }
    #formStatus {
      margin-top: 10px;
      font-size: 0.95rem;
      text-align: center;
    }
  </style>

  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context":"https://schema.org",
    "@type":"ContactPage",
    "name":"Contact CryptoWebBuild",
    "url":"https://cryptowebbuild.com/contact",
    "about":"Contact Sagor Ahamed for Web Development services"
  }
  </script>
</head>

<body>

<header class="header">
  <nav class="navbar container">
    <a href="/" class="nav-logo">SA</a>

    <ul class="nav-menu">
      <li><a href="/">Home</a></li>
      <li><a href="/services">Services</a></li>
      <li><a href="/projects">Projects</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/contact" class="active">Contact</a></li>
    </ul>

    <button class="hamburger" aria-label="Toggle Menu">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
    </button>
  </nav>
</header>

<main id="main-content" tabindex="-1">

  <section class="contact-section">
    <div class="container">
      <div class="contact-box fade-in">

        <h1>Let's Work Together</h1>
        <p>I usually respond within 1–3 hours. Tell me a little about your project.</p>

        <!-- CONTACT FORM -->
        <form id="cw-contact" class="contact-form"
              action="https://api.web3forms.com/submit"
              method="POST" novalidate>

          <input type="hidden" name="access_key" value="75fafb45-1a1e-41ee-86b7-4637bbd35224">
          <input type="hidden" name="subject" value="New Contact From CryptoWebBuild">
          <input type="hidden" name="redirect" value="https://cryptowebbuild.com/thank-you">

          <input type="text" name="name" placeholder="Your Name" required>
          <input type="email" name="email" placeholder="Email Address" required>

          <select name="project" required>
            <option value="">Select Project Type</option>
            <option value="crypto-web3">Crypto / Web3 Website</option>
            <option value="ecommerce">E-Commerce Store</option>
            <option value="business">Business Website</option>
            <option value="portfolio">Blog / Portfolio</option>
            <option value="other">Other</option>
          </select>

          <input type="text" name="budget" placeholder="Your Budget (optional)">

          <textarea name="message" rows="6" placeholder="Describe your project..." required></textarea>

          <!-- Anti bot -->
          <input type="checkbox" name="botcheck" style="display:none">

          <button type="submit">Send Message</button>

          <p id="formStatus"></p>
        </form>

      </div>
    </div>
  </section>

</main>

<footer class="footer">
  <div class="container">
    <div class="footer-social">
      <a href="https://x.com/WebBuildDev">X</a> ·
      <a href="https://youtube.com/@cryptowebbuild">YouTube</a> ·
      <a href="https://t.me/CryptoWebBuild">Telegram</a>
    </div>
    <p>&copy; 2025 CryptoWebBuild — All Rights Reserved.</p>
  </div>
</footer>

<script src="/script.js" defer></script>

<!-- FORM AJAX HANDLER -->
<script>
document.getElementById('cw-contact').addEventListener('submit', async function(e){
  e.preventDefault();

  const form = e.target;
  const status = document.getElementById("formStatus");
  status.textContent = "Sending…";

  const data = new FormData(form);

  try {
    const res = await fetch(form.action, { method: "POST", body: data });
    const json = await res.json();

    if (json.success) {
      status.textContent = "Message sent successfully! I will reply soon.";
      form.reset();
    } else {
      status.textContent = "Something went wrong. Try again.";
    }
  } catch (err) {
    status.textContent = "Network error — please try again.";
  }
});
</script>

</body>
</html>
