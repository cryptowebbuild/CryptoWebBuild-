<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — CryptoWebBuild</title>

  <meta name="description" content="Contact Sagor Ahamed for Web3, Crypto, Meme Coin, E-commerce and Business website development. Fast response and full support.">
  <link rel="canonical" href="https://cryptowebbuild.com/contact">

  <link rel="stylesheet" href="/style.css">

  <style>
    .contact-wrapper {
      max-width: 800px;
      margin: 120px auto 60px;
      padding: 0 20px;
    }

    .contact-title {
      text-align: center;
    }

    .contact-title h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
    }

    .contact-title p {
      color: #b7c3ff;
      max-width: 600px;
      margin: 10px auto;
      font-size: 1rem;
    }

    /* BOX STYLE */
    .form-box {
      background: #0e1324;
      padding: 30px;
      border-radius: 18px;
      margin-top: 30px;
      border: 1px solid #1f2942;
      box-shadow: 0 0 25px rgba(0, 150, 255, 0.05);
    }

    label {
      display: block;
      color: #a8b7ff;
      font-size: 0.95rem;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input, textarea, select {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid #222e4d;
      background: #10192f;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 20px;
      outline: none;
      transition: 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #00eaff;
      box-shadow: 0 0 10px rgba(0, 234, 255, 0.3);
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      font-size: 1.1rem;
      border: none;
      border-radius: 14px;
      background: #00c8ff;
      color: #00121f;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s;
    }

    .submit-btn:hover {
      background: #14d1ff;
      transform: translateY(-1px);
    }

    .contact-info {
      text-align: center;
      margin-top: 35px;
      color: #b7c3ff;
      font-size: 0.95rem;
    }

    .contact-info b {
      color: #00eaff;
    }
  </style>
</head>

<body>

<header class="header">
  <nav class="navbar container">
    <a href="/" class="nav-logo">SA</a>

    <ul class="nav-menu">
      <li><a href="/">Home</a></li>
      <li><a href="/services">Services</a></li>
      <li><a href="/projects">Projects</a></li>
      <li><a href="/blog">Blog</a></li>
      <li><a href="/about">About</a></li>
      <li><a class="active" href="/contact">Contact</a></li>
    </ul>

    <button class="hamburger"><span class="bar"></span><span class="bar"></span><span class="bar"></span></button>
  </nav>
</header>

<main>
  <div class="contact-wrapper">
    
    <div class="contact-title">
      <h1>Contact Me</h1>
      <p>Send your project details — I usually reply within 1–6 hours.</p>
    </div>

    <div class="form-box">
      <form action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="75fafb45-1a1e-41ee-86b7-4637bbd35224">
        <input type="hidden" name="redirect" value="https://cryptowebbuild.com/thank-you">

        <!-- NAME -->
        <label>Your Name</label>
        <input type="text" name="name" required placeholder="Enter your name">

        <!-- EMAIL -->
        <label>Your Email</label>
        <input type="email" name="email" required placeholder="Enter your email">

        <!-- CATEGORY -->
        <label>Project Category</label>
        <select name="category" required>
          <option value="" disabled selected>Select a project type</option>
          <option>Web3 & Crypto Website</option>
          <option>Meme Coin Landing Page</option>
          <option>Token Presale Website</option>
          <option>Business/Company Website</option>
          <option>E-commerce Store</option>
          <option>Portfolio Website</option>
          <option>Custom Web Project</option>
        </select>

        <!-- MESSAGE -->
        <label>Your Message</label>
        <textarea name="message" required placeholder="Describe your project..."></textarea>

        <!-- SUBMIT -->
        <button class="submit-btn">Send Message</button>
      </form>
    </div>

    <div class="contact-info">
      <p>You can email me directly:</p>
      <p><b>hello@cryptowebbuild.com</b></p>
      <p><b>cryptowebbuild@gmail.com</b> (Replies come from this mail)</p>
    </div>

  </div>
</main>

<footer class="footer">
  <div class="container">
    <p>&copy; 2025 CryptoWebBuild – All Rights Reserved.</p>
  </div>
</footer>

<script src="/script.js" defer></script>
</body>
</html>
