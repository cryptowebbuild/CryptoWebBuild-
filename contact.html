<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — CryptoWebBuild</title>
  <meta name="description" content="Contact Sagor Ahamed for Crypto, Web3, e-commerce and business websites. Fast replies and free consult." />
  <link rel="canonical" href="https://cryptowebbuild.com/contact">

  <!-- Favicons -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">

  <link rel="stylesheet" href="/style.css">

  <style>
    /* page-scoped contact styles (keeps global style.css intact) */
    .contact-wrapper { max-width:880px; margin:80px auto; padding:18px; }
    .contact-title { text-align:center; margin-bottom:18px; }
    .contact-title h1{font-size:1.8rem;margin:0}
    .contact-title p{color:rgba(255,255,255,0.78);margin-top:8px}
    .form-box{ background:#0e1324;padding:26px;border-radius:16px;border:1px solid rgba(255,255,255,0.04); box-shadow:0 8px 30px rgba(0,0,0,0.45); }
    label{display:block;color:rgba(255,255,255,0.88);font-weight:600;margin-bottom:6px}
    input, textarea, select{ width:100%; padding:12px 14px; border-radius:12px; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02); color:#fff; margin-bottom:16px; font-size:1rem; }
    input:focus, textarea:focus, select:focus{ outline:none; box-shadow:0 6px 20px rgba(0,209,255,0.06); border-color:#00d1ff; }
    .submit-btn{ width:100%; padding:14px; border-radius:12px; background:linear-gradient(90deg,#00c6ff,#0072ff); color:#001018; font-weight:700; border:none; cursor:pointer; font-size:1.05rem }
    .submit-btn:active{ transform:translateY(1px) }
    .contact-bottom { display:flex; gap:18px; align-items:center; justify-content:center; margin-top:20px; flex-wrap:wrap; }

    /* footer icons (same look as other pages) */
    .footer-icons { display:flex; gap:12px; align-items:center; justify-content:center; margin-top:28px; }
    .icon-link { width:44px; height:44px; display:inline-flex; align-items:center; justify-content:center; border-radius:10px; background:rgba(255,255,255,0.02); color:#00d1ff; text-decoration:none; transition:transform .12s ease, background .12s ease; }
    .icon-link:hover{ transform:translateY(-4px); background:rgba(0,209,255,0.06) }
    .icon-link svg{ width:20px; height:20px; fill:currentColor; display:block; }

    /* small note */
    .small-muted { color:rgba(255,255,255,0.66); font-size:0.95rem; text-align:center; margin-top:8px; }
  </style>
</head>
<body>
  <header class="header">
    <nav class="navbar container">
      <a href="/" class="nav-logo">CWB</a>
      <ul class="nav-menu">
        <li class="nav-item"><a href="/" class="nav-link">Home</a></li>
        <li class="nav-item"><a href="/services" class="nav-link">Services</a></li>
        <li class="nav-item"><a href="/projects" class="nav-link">Projects</a></li>
        <li class="nav-item"><a href="/blog" class="nav-link">Blog</a></li>
        <li class="nav-item"><a href="/about" class="nav-link">About</a></li>
        <li class="nav-item"><a href="/contact" class="nav-link active">Contact</a></li>
      </ul>
      <button class="hamburger" aria-label="Menu"><span class="bar"></span><span class="bar"></span><span class="bar"></span></button>
    </nav>
  </header>

  <main>
    <div class="contact-wrapper">
      <div class="contact-title">
        <h1>Contact Me</h1>
        <p>Tell me about your project — I usually reply within a few hours.</p>
      </div>

      <div class="form-box" aria-labelledby="contact-form">
        <form id="contact-form" action="https://api.web3forms.com/submit" method="POST">
          <!-- REQUIRED: your access key -->
          <input type="hidden" name="access_key" value="75fafb45-1a1e-41ee-86b7-4637bbd35224">
          <!-- redirect after success -->
         <input type="hidden" name="_redirect" value="https://cryptowebbuild.com/thank-you">

          <label for="name">Your Name</label>
          <input id="name" name="name" type="text" placeholder="Your name" required>

          <label for="email">Your Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required>

          <label for="category">Project Category</label>
          <select id="category" name="category" required>
            <option value="" disabled selected>Select a project type</option>
            <option>Web3 & Crypto Website</option>
            <option>Meme Coin Landing Page</option>
            <option>Token Presale Website</option>
            <option>Business/Company Website</option>
            <option>E-commerce Store</option>
            <option>Portfolio / Blog</option>
            <option>Custom Web Project</option>
          </select>

          <label for="budget">Project Budget</label>
          <select id="budget" name="budget" required>
            <option value="" disabled selected>Select your budget</option>
            <option>$50 – $150 (Small pages / fixes)</option>
            <option>$150 – $300 (Starter website)</option>
            <option>$300 – $600 (Business website)</option>
            <option>$600 – $1200 (Crypto / Web3 site)</option>
            <option>$1200+ (Custom project / Full DApp)</option>
          </select>

          <label for="message">Your Message</label>
          <textarea id="message" name="message" placeholder="Describe your project..." required></textarea>

          <button type="submit" class="submit-btn">Send Message</button>
        </form>
      </div>

      <div class="contact-bottom">
        <div class="small-muted">Prefer a direct message? Reach me on Telegram or email.</div>
      </div>

      <!-- Footer icons only (no plain email text) -->
      <div class="footer-icons" role="navigation" aria-label="Social links">
        <!-- X / Twitter -->
        <a class="icon-link" href="https://x.com/WebBuildDev" target="_blank" rel="noopener noreferrer" aria-label="X (Twitter)">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 5.92c-.66.29-1.37.48-2.13.57.77-.46 1.36-1.18 1.64-2.04-.72.42-1.52.72-2.38.88A4.02 4.02 0 0 0 12.5 9.5c0 .31.03.61.1.9-3.34-.17-6.3-1.77-8.28-4.2-.35.6-.55 1.28-.55 2.01 0 1.39.71 2.61 1.79 3.33-.66-.02-1.27-.2-1.81-.5v.05c0 1.93 1.37 3.54 3.18 3.9-.33.09-.68.14-1.04.14-.25 0-.5-.03-.74-.07.5 1.57 1.95 2.71 3.67 2.75A8.07 8.07 0 0 1 3 19.54 11.4 11.4 0 0 0 9.56 21c7.18 0 11.1-5.94 11.1-11.1v-.51c.77-.56 1.43-1.27 1.96-2.07-.7.31-1.45.52-2.22.62z"/></svg>
        </a>

        <!-- YouTube -->
        <a class="icon-link" href="https://youtube.com/@cryptowebbuild" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M23 7.2a3 3 0 0 0-2.1-2.1C19.5 4.6 12 4.6 12 4.6s-7.5 0-8.9.5A3 3 0 0 0 .9 7.6C.5 9.1.5 12 .5 12s0 2.9.4 4.4a3 3 0 0 0 2.2 2.1c1.4.5 8.9.5 8.9.5s7.5 0 8.9-.5a3 3 0 0 0 2.1-2.1c.5-1.5.5-4.4.5-4.4s0-2.9-.5-4.4zM9.8 15V9l5.2 3-5.2 3z"/></svg>
        </a>

        <!-- Telegram -->
        <a class="icon-link" href="https://t.me/CryptoWebBuild" target="_blank" rel="noopener noreferrer" aria-label="Telegram">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.3 3.2L2.7 10.6c-.9.35-.9 1.2-.17 1.47l4.2 1.3 1.6 5.27c.3.96.8 1.06 1.4.62L12 15l4.3 3.1c.7.4 1.5-.1 1.4-.9L19 9 21 3z"/></svg>
        </a>

        <!-- GitHub -->
        <a class="icon-link" href="https://github.com/cryptowebbuild" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .5C5.7.5.9 5.4.9 11.6c0 4.8 3.1 8.9 7.5 10.3.5.1.7-.2.7-.5v-2c-3 .6-3.7-1.5-3.7-1.5-.5-1.3-1.2-1.6-1.2-1.6-1-.7.1-.7.1-.7 1.1.1 1.6 1.1 1.6 1.1 1 1.7 2.6 1.2 3.2.9.1-.7.4-1.2.7-1.4-2.4-.3-5-1.2-5-5.4 0-1.2.4-2.2 1.1-2.9-.1-.3-.5-1.4.1-2.9 0 0 1-.3 3.1 1.1.9-.3 1.9-.4 2.9-.4s1.9.1 2.9.4c2.1-1.4 3.1-1.1 3.1-1.1.6 1.5.2 2.6.1 2.9.7.8 1.1 1.7 1.1 2.9 0 4.2-2.6 5.1-5 5.4.4.4.7 1.1.7 2.1v3c0 .3.2.6.7.5 4.4-1.4 7.5-5.5 7.5-10.3C23 5.4 18.2.5 12 .5z"/></svg>
        </a>

        <!-- Email (mailto) -->
        <a class="icon-link" href="mailto:hello@cryptowebbuild.com" aria-label="Email hello@cryptowebbuild.com">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 5.5A2 2 0 0 1 4.5 4h15a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2h-15a2 2 0 0 1-2-2v-11zm2 .5v10h15v-10l-7.5 5L4.5 6z"/></svg>
        </a>
      </div>

    </div>
  </main>

  <footer class="footer" role="contentinfo" aria-label="Footer">
    <div class="container" style="text-align:center;margin-top:28px;">
      <p style="color:rgba(255,255,255,0.6);margin:0;">© <span id="footer-year">2025</span> CryptoWebBuild — Sagor Ahamed</p>
    </div>
  </footer>

  <script src="/script.js" defer></script>
  <script>
    // Footer year fallback
    (function(){ try { var fy=document.getElementById('footer-year'); if(fy) fy.textContent=new Date().getFullYear(); } catch(e){} })();
  </script>
</body>
</html>
